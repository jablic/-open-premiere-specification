surfaces:
  - id: extendscript
    title: ExtendScript DOM
    status: legacy_official
    purpose: Automate Premiere Pro through ExtendScript/JSX.
    primary_runtime: ExtendScript
    evidence_policy: official_or_adobe_sample_required_for_signatures

  - id: uxp
    title: UXP Premiere API
    status: current_official
    purpose: Build modern Premiere Pro plugins and panels.
    primary_runtime: UXP JavaScript
    evidence_policy: official_required_for_signatures

  - id: cep
    title: CEP Panels
    status: legacy_official
    purpose: Build HTML/JavaScript extensions using CEP and bridge into ExtendScript.
    primary_runtime: Chromium Embedded Framework + ExtendScript bridge
    evidence_policy: official_or_adobe_sample_required_for_core_behaviour

  - id: qe
    title: QE DOM
    status: undocumented_or_semi_documented
    purpose: Access internal scripting interfaces not fully covered by public DOM.
    primary_runtime: ExtendScript with QE enabled
    evidence_policy: reproduced_or_community_verified_required

  - id: sdk_cpp
    title: Premiere Pro C++ SDK
    status: official_sdk
    purpose: Build native plugins such as importers, exporters, and effects.
    primary_runtime: Native C/C++ plugin
    evidence_policy: sdk_header_or_sdk_guide_required
