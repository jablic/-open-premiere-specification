name: OPS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Validate knowledge repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile PKC artifacts
        run: python3 tools/pkc.py all

      - name: Validate PKC repository
        run: python3 tools/pkc.py validate

      - name: Build OPS knowledge graph
        run: python3 tools/ops_graph.py build

      - name: Validate OPS knowledge graph
        run: python3 tools/ops_graph.py validate

      - name: Run Python tests
        run: pytest -q

      - name: Build MkDocs site
        run: mkdocs build --strict
