$schema: "https://json-schema.org/draft/2020-12/schema"
title: OPS AI Rule Knowledge Card
kind: schema
version: 1.0.0
required: [id, kind, title, severity, statement, rationale, applies_to, tests, evidence]
properties:
  id:
    type: string
    pattern: "^RULE-[0-9]{4}$"
  kind:
    const: rule
  title:
    type: string
  severity:
    enum: [critical, high, medium, low]
  statement:
    type: string
  rationale:
    type: string
  applies_to:
    type: array
    items: { type: string }
  violation_examples:
    type: array
    items: { type: string }
  safe_pattern:
    type: string
  tests:
    type: array
    items: { type: string }
  evidence:
    type: array
    items: { type: string }
