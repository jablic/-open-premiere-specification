$schema: "https://json-schema.org/draft/2020-12/schema"
title: OPS Capability Card
version: 1.0.0
required:
  - id
  - kind
  - title
  - status
  - summary
  - intent
  - inputs
  - outputs
  - knowledge_dependencies
  - safety_rules
  - tests
  - evidence
properties:
  id:
    type: string
    pattern: "^CAP-[0-9]{4}$"
  kind:
    const: Capability
  title:
    type: string
  status:
    enum: [Draft, Review, Stable, Deprecated]
  summary:
    type: string
  intent:
    type: string
  scope:
    type: object
    properties:
      includes:
        type: array
        items: { type: string }
      excludes:
        type: array
        items: { type: string }
  inputs:
    type: array
    items:
      type: object
      required: [name, type, required]
      properties:
        name: { type: string }
        type: { type: string }
        required: { type: boolean }
        description: { type: string }
  outputs:
    type: array
    items:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
  workflow:
    type: array
    items: { type: string }
  knowledge_dependencies:
    type: object
    properties:
      objects:
        type: array
        items: { type: string }
      api:
        type: array
        items: { type: string }
      serialization:
        type: array
        items: { type: string }
      rules:
        type: array
        items: { type: string }
      recipes:
        type: array
        items: { type: string }
  safety_rules:
    type: array
    items: { type: string }
  failure_modes:
    type: array
    items: { type: string }
  validation:
    type: array
    items: { type: string }
  tests:
    type: array
    items: { type: string }
  evidence:
    type: array
    items: { type: string }
  quality:
    type: object
    properties:
      completeness: { type: integer, minimum: 0, maximum: 100 }
      confidence: { enum: [official, experimental, production_verified, inferred, hypothesis] }
