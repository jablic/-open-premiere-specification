<!-- UXP Responsive/"Rubber" Panel Example
     Demonstrates:
     1. Theme sync via --uxp-host-* CSS variables (automatic, no JS needed)
     2. Responsive Flexbox layout that reflows as panel is resized
     3. Content-aware hiding at narrow widths
     4. ResizeObserver fallback to window.resize for cross-platform safety
-->

<html>
<head>
  <meta charset="UTF-8">
  <title>UXP Responsive Panel</title>
  <style>
    :root {
      --gap: 8px;
      --padding: 12px;
      --min-item-width: 160px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Theme sync: inherit host colors automatically via UXP's built-in CSS variables */
      background-color: var(--uxp-host-background-color);
      color: var(--uxp-host-text-color);
      border-color: var(--uxp-host-border-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: var(--uxp-host-font-size);

      padding: var(--padding);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      font-weight: bold;
      margin-bottom: var(--gap);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--uxp-host-border-color);
      opacity: 0.8;
    }

    /* Rubber/responsive layout container */
    .content {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: var(--gap);
      align-content: flex-start;
    }

    /* Each control item grows/shrinks to fill available space */
    .control-item {
      flex: 1 1 var(--min-item-width);
      min-width: 0;  /* CRITICAL: allow shrinking below content width */
      padding: var(--gap);
      border: 1px solid var(--uxp-host-border-color);
      border-radius: 3px;
    }

    .control-item:hover {
      background-color: var(--uxp-host-widget-hover-background-color);
    }

    .item-label {
      display: block;
      font-size: var(--uxp-host-font-size-smaller);
      color: var(--uxp-host-label-text-color);
      margin-bottom: 4px;
    }

    .item-value {
      font-weight: 500;
      word-break: break-all;
    }

    button {
      padding: 6px 12px;
      background-color: transparent;
      border: 1px solid var(--uxp-host-border-color);
      color: var(--uxp-host-text-color);
      cursor: pointer;
      border-radius: 3px;
      font-size: var(--uxp-host-font-size);
      font-family: inherit;
      margin-top: 6px;
      width: 100%;
    }

    button:hover {
      background-color: var(--uxp-host-widget-hover-background-color);
    }

    /* Narrow layout: stack items vertically */
    body.stacked .content {
      flex-direction: column;
    }

    body.stacked .control-item {
      flex: 1 1 auto;
      width: 100%;
    }

    /* Compact mode: hide secondary info at very narrow widths */
    .secondary-label {
      display: block;
      font-size: var(--uxp-host-font-size-smaller);
      opacity: 0.6;
      margin-top: 4px;
    }

    body.compact .secondary-label {
      display: none;
    }

    .footer {
      margin-top: var(--gap);
      padding-top: var(--gap);
      border-top: 1px solid var(--uxp-host-border-color);
      font-size: var(--uxp-host-font-size-smaller);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="header">Responsive Panel (Rubber Layout)</div>

  <div class="content" id="content">
    <!-- Items will be generated by JS below -->
  </div>

  <div class="footer">
    Panel width: <span id="width">–</span>px | Layout: <span id="layout">standard</span>
  </div>

  <script>
    // ============================================================================
    // Responsive/"Rubber" Layout Engine
    // ============================================================================

    const contentEl = document.getElementById('content');
    const widthDisplay = document.getElementById('width');
    const layoutDisplay = document.getElementById('layout');

    // Generate sample control items
    function generateItems() {
      const items = [
        { label: 'Sequence', value: 'DCI 4K 24p' },
        { label: 'Timeline', value: '01:23:45:18' },
        { label: 'Active Track', value: 'V1' },
        { label: 'Zoom Level', value: '75%' },
        { label: 'FPS', value: '23.976' },
        { label: 'Mode', value: 'Edit' },
      ];

      contentEl.innerHTML = items
        .map(item => `
          <div class="control-item">
            <span class="item-label">${item.label}</span>
            <div class="item-value">${item.value}</div>
            <span class="secondary-label">metadata</span>
            <button>Action</button>
          </div>
        `)
        .join('');
    }

    // Reflow logic: switch layout classes based on available width
    function reflow() {
      const width = contentEl.clientWidth;
      widthDisplay.textContent = width;

      // Stacked layout for very narrow panels
      if (width < 260) {
        document.body.classList.add('stacked');
        document.body.classList.remove('compact');
        layoutDisplay.textContent = 'stacked';
      }
      // Compact (hide secondary info) for narrow panels
      else if (width < 340) {
        document.body.classList.remove('stacked');
        document.body.classList.add('compact');
        layoutDisplay.textContent = 'compact';
      }
      // Standard: full layout
      else {
        document.body.classList.remove('stacked', 'compact');
        layoutDisplay.textContent = 'standard';
      }
    }

    // Initialization
    window.addEventListener('load', function() {
      generateItems();

      // Baseline: standard window resize event (works in CEP + UXP)
      window.addEventListener('resize', reflow);

      // Preferred: ResizeObserver (works in CEP/CEF; UXP support unverified)
      // Graceful fallback if unavailable
      if (typeof ResizeObserver !== 'undefined') {
        try {
          new ResizeObserver(reflow).observe(contentEl);
          console.log('ResizeObserver active');
        } catch (e) {
          console.warn('ResizeObserver failed, using window.resize fallback:', e.message);
        }
      }

      // Initial layout pass
      reflow();
    });
  </script>
</body>
</html>
