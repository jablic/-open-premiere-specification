kind: api
id: API-EXT-0001
title: ExtendScript Boundary
status: draft
confidence: DOCUMENTED
purpose: Define the boundary, risks and planning rules for ExtendScript Boundary.
summary: ExtendScript is the legacy scripting surface used by CEP panels and scripts. It is synchronous and remains important for existing integrations, but new work should evaluate UXP first.
constraints:
- Do not mix APIs in one solution unless the bridging mechanism is explicit.
- Always state whether a proposed method is ExtendScript, UXP, CEP, QE, Python, XML, or external automation.
ai_rules:
- If the API surface is unknown, stop and ask for verification instead of inventing methods.
