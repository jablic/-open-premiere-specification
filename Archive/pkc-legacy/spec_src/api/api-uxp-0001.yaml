purpose: Define the boundary, risks and planning rules for UXP Boundary.
summary: UXP is the modern plugin and scripting platform for Premiere Pro. UXP exposes the Premiere DOM through require("premierepro"); Premiere operations may require asynchronous calls.
constraints:
- Do not mix APIs in one solution unless the bridging mechanism is explicit.
- Always state whether a proposed method is ExtendScript, UXP, CEP, QE, Python, XML, or external automation.
