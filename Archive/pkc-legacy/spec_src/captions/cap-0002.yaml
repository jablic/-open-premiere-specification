kind: spec
id: CAP-0002
title: Caption Timing Contract
status: draft
confidence: medium
purpose: Define Caption Timing Contract for safe AI-assisted caption automation.
summary: Caption start time must be non-negative and duration must be positive.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
