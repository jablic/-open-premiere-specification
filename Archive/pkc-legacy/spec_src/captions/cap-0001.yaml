kind: spec
id: CAP-0001
title: Caption Internal Model
status: draft
confidence: medium
purpose: Define Caption Internal Model for safe AI-assisted caption automation.
summary: Caption owns timing and text; formatting may be represented through runs and serialized metadata.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
