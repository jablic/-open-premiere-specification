kind: spec
id: CAP-0003
title: Caption Text Run Contract
status: draft
confidence: medium
purpose: Define Caption Text Run Contract for safe AI-assisted caption automation.
summary: Text runs map character ranges to textual segments and must remain coherent after edits.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
