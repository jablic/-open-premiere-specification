kind: spec
id: CAP-0004
title: Caption Style Run Contract
status: draft
confidence: medium
purpose: Define Caption Style Run Contract for safe AI-assisted caption automation.
summary: Style runs must be preserved unless a style edit is intentional.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
