kind: spec
id: CAP-0012
title: Caption QC Protocol
status: draft
confidence: medium
purpose: Define Caption QC Protocol for safe AI-assisted caption automation.
summary: Caption QC should check overlap, reading speed, empty cues, invalid characters and formatting integrity.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
related:
- OBJ-0009
- SER-0002
- RULE-CAP-0001
- RULE-CAP-0002
- RULE-SER-0001
