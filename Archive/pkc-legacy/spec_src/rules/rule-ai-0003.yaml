kind: rule
id: RULE-AI-0003
title: Declare API Layer
status: active
confidence: high
severity: error
rule: 'Every code answer must explicitly identify the API layer: UXP, ExtendScript, CEP, QE, XML, Python, ffmpeg, or hybrid.'
purpose: Prevent unsafe or hallucinated AI behavior when developing Premiere Pro automation.
prevents:
- Unsupported code generation
- Data loss
- Wrong API-layer assumptions
validation:
- Check generated answer for rule compliance.
