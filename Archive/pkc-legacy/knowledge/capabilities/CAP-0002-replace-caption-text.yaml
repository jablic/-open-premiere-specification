id: CAP-0002
kind: Capability
title: Replace Caption Text
status: Draft
summary: Safely replace caption text while preserving timing, identity, style runs and unknown serialization fields.
intent: Provide a capability pack for AI agents that need to update subtitles/captions without corrupting formatting or timing.
scope:
  includes:
    - Identify caption storage layer.
    - Replace visible text.
    - Preserve timing and non-text metadata.
    - Validate run-length-sensitive structures.
  excludes:
    - Regenerating all captions from scratch unless explicitly requested.
    - Dropping style runs.
    - Assuming captions are plain text.
inputs:
  - name: caption_source
    type: CaptionTrack|SRT|CaptionJSON|PremiereXML
    required: true
    description: Source representation containing caption data.
  - name: replacement_map
    type: Mapping[caption_id|string, text]
    required: true
    description: Mapping from caption identity or original text to replacement text.
outputs:
  - name: updated_captions
    type: CaptionData
    description: Updated caption representation.
  - name: validation_report
    type: StructuredReport
    description: Report covering timing, text replacement, style preservation and serialization checks.
workflow:
  - Determine whether the input is API object, SRT, XML, or internal JSON-like caption representation.
  - Create backup or duplicate working representation.
  - Replace only intended text payload.
  - Preserve caption timing.
  - Preserve unknown fields and style metadata.
  - Validate text runs and style runs.
  - Return updated data plus validation report.
knowledge_dependencies:
  objects:
    - OBJ-0005
    - OBJ-0009
  serialization:
    - SER-0002
  rules:
    - RULE-0001
    - RULE-0002
    - RULE-0003
    - RULE-0006
    - RULE-0007
  recipes:
    - REC-0002
safety_rules:
  - RULE-0003
  - RULE-0006
  - RULE-0007
failure_modes:
  - Caption source lacks stable identifiers.
  - Replacement changes text run lengths without updating dependent metadata.
  - Unknown fields are dropped during serialization.
validation:
  - Caption count must remain unchanged unless explicitly requested.
  - Start/end times must remain unchanged unless explicitly requested.
  - Unknown fields must survive roundtrip.
  - Style metadata must be preserved or explicitly reported as unsupported.
tests:
  - TEST-0021
  - TEST-0022
  - TEST-0023
evidence:
  - EVID-0002
  - EVID-0003
quality:
  completeness: 45
  confidence: experimental
