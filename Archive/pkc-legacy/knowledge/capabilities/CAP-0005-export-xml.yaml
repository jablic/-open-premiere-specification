id: CAP-0005
kind: Capability
title: Export Premiere XML
status: Draft
summary: Export or work with Premiere XML as an interchange representation while accounting for information loss and roundtrip limitations.
intent: Provide AI agents with a safe decision model for XML-based automation and external processing.
scope:
  includes:
    - Determine when XML is appropriate.
    - Preserve project identity and timeline references.
    - Use XML for read/transform/report workflows.
    - Validate roundtrip risks.
  excludes:
    - Treating XML as a complete representation of every Premiere project feature.
inputs:
  - name: sequence_or_project
    type: Project|Sequence
    required: true
    description: Source to export or inspect via XML.
  - name: xml_workflow
    type: enum[read_only,transform,roundtrip]
    required: false
    description: Intended XML usage.
outputs:
  - name: xml_file
    type: XMLDocument
    description: Exported or transformed XML document.
  - name: risk_report
    type: StructuredReport
    description: Known limitations and possible information-loss warnings.
workflow:
  - Identify target project or sequence.
  - Export XML using supported workflow.
  - Parse XML without discarding unknown nodes.
  - Apply transformations only when safe.
  - Validate references and report unsupported constructs.
knowledge_dependencies:
  objects:
    - OBJ-0002
    - OBJ-0005
  serialization:
    - SER-0001
  rules:
    - RULE-0002
    - RULE-0005
    - RULE-0010
  recipes:
    - REC-0005
safety_rules:
  - RULE-0010
failure_modes:
  - XML omits Premiere-specific runtime state.
  - Effects, captions, MOGRT, or metadata fail to roundtrip exactly.
  - External parser rewrites unknown structures.
validation:
  - XML must remain well-formed.
  - Unknown nodes/attributes must be preserved where transformation is performed.
  - Report any constructs not represented in XML.
tests:
  - TEST-0050
  - TEST-0051
evidence:
  - EVID-0001
  - EVID-0002
quality:
  completeness: 50
  confidence: experimental
