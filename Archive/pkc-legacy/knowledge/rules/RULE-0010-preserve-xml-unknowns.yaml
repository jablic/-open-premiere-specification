id: RULE-0010
kind: Rule
title: Preserve unknown XML structures
status: Draft
severity: High
summary: XML transform workflows must preserve unknown nodes and attributes wherever possible and report any unsupported structures.
applies_to:
  - CAP-0005
rationale: Premiere XML is an interchange representation and may omit or encode features in ways an external tool does not fully understand.
forbidden:
  - Normalizing XML by discarding unknown nodes.
  - Claiming XML roundtrip is lossless for all Premiere features.
required:
  - Use loss-aware parsing.
  - Report unsupported features.
  - Validate references after transformation.
evidence:
  - EVID-0001
  - EVID-0002
tests:
  - TEST-0050
quality:
  confidence: experimental
