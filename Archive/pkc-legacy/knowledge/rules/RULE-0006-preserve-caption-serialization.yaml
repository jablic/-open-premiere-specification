id: RULE-0006
kind: Rule
title: Preserve caption serialization structures
status: Draft
severity: Critical
summary: Caption text edits must preserve timing, style metadata, run structures and unknown serialization fields unless the user explicitly requests destructive normalization.
applies_to:
  - CAP-0002
  - OBJ-0009
rationale: Captions are not guaranteed to be plain text. Formatting and internal metadata may be stored in run-based structures that can become inconsistent after text replacement.
forbidden:
  - Replacing a caption object with plain text only.
  - Dropping unknown JSON fields.
  - Changing timing during text-only replacement.
required:
  - Detect serialization layer.
  - Preserve unknown fields.
  - Validate run structures after replacement.
evidence:
  - EVID-0002
tests:
  - TEST-0021
  - TEST-0022
quality:
  confidence: experimental
