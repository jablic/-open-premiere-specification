id: OBJ-0005
kind: object
name: Sequence
status: draft
summary: >
  A timeline container that owns ordered tracks and sequence-level markers. It references project items through track items but does not own source media files.
aliases:
  - Timeline
  - Sequence Timeline
ownership:
  owned_by:
    - Project
    - ProjectItem
  owns:
    - VideoTrack
    - AudioTrack
    - CaptionTrack
    - MarkerCollection
  does_not_own:
    - Source Media Files
    - ProjectItem source media
relationships:
  references:
    - ProjectItem
    - Media indirectly through ProjectItem
  referenced_by:
    - Project
    - ProjectItem
    - Nested Sequence TrackItem
  contains:
    - Tracks
    - TrackItems
    - Sequence Markers
  related:
    - Track
    - TrackItem
    - CaptionTrack
    - Premiere XML
lifecycle:
  - created
  - edited
  - nested
  - exported
  - duplicated
  - removed
serialization:
  formats:
    - prproj
    - Premiere XML
  roundtrip_risk: high
  notes:
    - XML export is useful for interchange but may not preserve every Premiere-specific feature.
    - Nested sequences introduce reference graph complexity.
api_surface:
  extendscript: supported
  uxp: partial
  cep: supported
  qe: partial
constraints:
  - Sequence is not media.
  - Sequence owns tracks, not source files.
  - TrackItem identity must be distinguished from ProjectItem identity.
  - Destructive timeline edits require backup or duplicate sequence workflow.
anti_patterns:
  - Treating sequence as a list of media files.
  - Assuming every visible clip has a unique ProjectItem.
  - Modifying a locked sequence without explicit user intent.
ai_rules:
  - RULE-0002
  - RULE-0003
  - RULE-0004
  - RULE-0005
tests:
  - TEST-0011
  - TEST-0012
  - TEST-0013
evidence:
  - EVID-0001
  - EVID-0002
  - EVID-0003
quality:
  completeness: 72
  confidence: official
  ai_ready: true
  production_ready: false
