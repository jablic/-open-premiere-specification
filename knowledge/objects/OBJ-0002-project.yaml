id: OBJ-0002
kind: object
name: Project
status: draft
summary: >
  The root logical container for a Premiere Pro working project. It owns project items, bins, sequences, metadata, and project-level state, while media files remain external resources referenced by project items.
aliases:
  - app.project
  - Premiere Project
ownership:
  owned_by:
    - Application
  owns:
    - Bin
    - ProjectItem
    - Sequence
    - Project Metadata
  does_not_own:
    - Source Media Files
    - Filesystem Assets
relationships:
  references:
    - Media
    - External Files
  referenced_by:
    - Application
  contains:
    - Root Bin
    - ProjectItem Tree
    - Sequence Collection
  related:
    - Production
    - TeamProject
    - Premiere XML
lifecycle:
  - created
  - opened
  - modified
  - saved
  - exported
  - closed
serialization:
  formats:
    - prproj
    - Premiere XML
  roundtrip_risk: medium
  notes:
    - Native project serialization preserves more information than XML interchange.
    - XML roundtrip may lose unsupported metadata or app-specific state.
api_surface:
  extendscript: supported
  uxp: partial
  cep: supported
  qe: partial
constraints:
  - Project identity must not be inferred from display name alone.
  - ProjectItem identity and filesystem media identity are not equivalent.
  - Saving or exporting a project can be destructive if automation overwrites files without backup.
anti_patterns:
  - Treating a project as a single timeline.
  - Assuming all media referenced by the project is online.
  - Assuming XML export is a lossless representation of the project.
ai_rules:
  - RULE-0001
  - RULE-0002
  - RULE-0003
  - RULE-0004
tests:
  - TEST-0003
  - TEST-0004
  - TEST-0005
evidence:
  - EVID-0001
  - EVID-0002
  - EVID-0003
quality:
  completeness: 70
  confidence: official
  ai_ready: true
  production_ready: false
