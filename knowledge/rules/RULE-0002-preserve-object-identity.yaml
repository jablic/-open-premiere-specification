id: RULE-0002
kind: rule
title: Preserve object identity
severity: critical
statement: >
  Automation must preserve the distinction between display names, project items, timeline instances, and source media files.
rationale: >
  Premiere workflows frequently contain duplicate names, reused source items, nested sequences, and multiple timeline instances referencing the same project item.
applies_to:
  - OBJ-0002
  - OBJ-0003
  - OBJ-0004
  - OBJ-0005
violation_examples:
  - Using clip name as the only identity key.
  - Treating ProjectItem and TrackItem as interchangeable.
safe_pattern: >
  Resolve object type, ownership, and reference direction before modifying any project or timeline object.
tests:
  - TEST-0003
  - TEST-0008
evidence:
  - EVID-0003
