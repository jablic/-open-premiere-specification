kind: spec
id: CAP-0008
title: Caption Export Protocol
status: draft
confidence: medium
purpose: Define Caption Export Protocol for safe AI-assisted caption automation.
summary: Export workflows must validate timing, text and formatting after conversion.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
