kind: spec
id: CAP-0010
title: Caption Safe Replacement Protocol
status: draft
confidence: medium
purpose: Define Caption Safe Replacement Protocol for safe AI-assisted caption automation.
summary: Text replacement must preserve unknown metadata and validate run lengths.
constraints:
- Preserve unknown fields.
- Validate after every write.
- Do not infer undocumented serializer behavior.
ai_rules:
- When unsure whether captions are plain text or rich serialized structures, assume rich structures and avoid destructive edits.
