kind: api
id: API-ENC-0001
title: Encoder Boundary
status: draft
confidence: MEDIUM
purpose: Define the boundary, risks and planning rules for Encoder Boundary.
summary: Encoding workflows may use Premiere export APIs or Adobe Media Encoder integration. Export plans must specify preset, path, side effects and queue behavior.
constraints:
- Do not mix APIs in one solution unless the bridging mechanism is explicit.
- Always state whether a proposed method is ExtendScript, UXP, CEP, QE, Python, XML, or external automation.
ai_rules:
- If the API surface is unknown, stop and ask for verification instead of inventing methods.
