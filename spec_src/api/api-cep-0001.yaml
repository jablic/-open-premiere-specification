kind: api
id: API-CEP-0001
title: CEP Boundary
status: draft
confidence: DOCUMENTED
purpose: Define the boundary, risks and planning rules for CEP Boundary.
summary: CEP panels can host HTML/JS UI and call ExtendScript. CEP remains common in installed tooling but should be treated as legacy when planning new long-lived extensions.
constraints:
- Do not mix APIs in one solution unless the bridging mechanism is explicit.
- Always state whether a proposed method is ExtendScript, UXP, CEP, QE, Python, XML, or external automation.
ai_rules:
- If the API surface is unknown, stop and ask for verification instead of inventing methods.
