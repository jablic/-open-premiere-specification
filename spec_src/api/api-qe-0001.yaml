purpose: Define the boundary, risks and planning rules for QE Boundary.
summary: QE is an unofficial/internal interface used by many scripts. AI agents must treat QE as unstable and require explicit user consent before suggesting QE-dependent workflows.
constraints:
- Do not mix APIs in one solution unless the bridging mechanism is explicit.
- Always state whether a proposed method is ExtendScript, UXP, CEP, QE, Python, XML, or external automation.
ai_rules:
- If the API surface is unknown, stop and ask for verification instead of inventing methods.
