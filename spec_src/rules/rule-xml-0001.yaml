kind: rule
id: RULE-XML-0001
title: XML Is Not Full Fidelity
status: active
confidence: high
severity: warning
rule: Premiere XML export can omit or transform project state; do not treat XML as a full project backup.
purpose: Prevent unsafe or hallucinated AI behavior when developing Premiere Pro automation.
prevents:
- Unsupported code generation
- Data loss
- Wrong API-layer assumptions
validation:
- Check generated answer for rule compliance.
related:
- FOUND-0001
- FOUND-0002
